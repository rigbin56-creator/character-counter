<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <!-- <link rel="stylesheet" href="web-style.css"> -->
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
     <header>
        <div class="logo-container"><img src="./assets/icons/logo.png" alt=""></div>
        <h1>Character Counter</h1>
        <button id="dark-mode"><img src="./assets/icons/light-mode.png" alt="" class="dark-mode-icon"></button>
     </header>
    
     <main>
        <section>
            <div class="inputs-zone">
                <h2>Analyze your text in real-time.</h2>
                <textarea id="textarea" placeholder="Enter text here"></textarea>
               <div class="left-controls">
                 <label>
                  <input type="checkbox" name="exclude-spaces" class="chkbox"> Exclude Spaces
                </label>
                <label></label>
                  <input type="checkbox" name="set-limit" class="chkbox"> Set Character Limit
                  </label>
                  <p class="reading-time">Approx. reading time: <1 minute</p>
               </div>
            </div>
            
            <div class="stats">
                <div class="card-total-characters">
                    <p class="total-characters-value">278</p>
                </div>
                <div class="card-word-count">
                    <p class="word-count-value">39</p>
                </div>
                <div class="card-sentnence-count">
                    <p class="sentence-count-value">04</p>
                </div>
            </div>
        </section>
     </main>

    <!-- <h1>Character Counter</h1>
    <textarea id="textarea" placeholder="Enter text here"></textarea>
    <div class="counter-container">
        <p>Total Characters: <span id="total-count">0</span></p>
        <p>Remaining Characters: <span id="remaining-count">0</span></p> -->
</body>
</html>
