<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <!-- <link rel="stylesheet" href="web-style.css"> -->
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
     <header>
        <div class="logo-container"><img src="./assets/icons/logo.png" alt=""></div>
        <h1>Character Counter</h1>
        <button id="dark-mode"><img src="./assets/icons/light-mode.png" alt="" class="dark-mode-icon"></button>
     </header>
    
     <main>
        <section>
            <div class="inputs-zone">
                <h2>Analyze your text in real-time.</h2>
                <textarea id="textarea" placeholder="Enter text here"></textarea>

               <div class="row-controls">
                 <div class="left-controls">
                   <label>
                    <input type="checkbox" name="exclude-spaces" class="chkbox"> Exclude Spaces
                   </label>
                   <label>
                    <input type="checkbox" name="set-limit" class="chkbox"> Set Character Limit
                   </label>

                 </div>
                    <div class="right-side">
                      <p>Approx. reading time: <1 minute</p>
                    </div>
               </div>
            </div>
            
            <div class="result-zone">
                <div class="card-total-characters result-card">
                    <p class="total-value-result">278</p>
                    <p>Total Characters</p>
                </div>
                <div class="card-word-count result-card">
                    <p class="total-value-result">39</p>
                    <p>Word Count</p>
                </div>
                <div class="card-sentnence-count result-card">
                    <p class="total-value-result">04</p>
                    <p>Sentence Count</p>
                </div>
            </div>

            <div class="letter-density-zone">
                <h3>Letter Density</h3>
                  <div class="density-row">
                    <span class="letter">E</span>
                      <div class="bar">
                        <div class="fill"></div>
                      </div>
                    <span class="stats">40 (16.06%)</span>

            <div class="density-row">
                    <span class="letter">I</span>
                      <div class="bar">
                        <div class="fill"></div>
                      </div>
                    <span class="stats">40 (16.06%)</span>
                  </div>
                <button>See More ⮟</button>
            </div>
        </section>
     </main>

</body>
</html>
